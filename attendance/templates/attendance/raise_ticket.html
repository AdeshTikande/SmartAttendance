{% extends 'attendance/base.html' %}
{% block content %}
<div class="card">
    <div class="card-header">
        <i class="fas fa-ticket-alt me-2"></i> Raise Attendance Ticket
    </div>
    <div class="card-body p-4">
        <div class="alert alert-info">
            <strong>Student:</strong> {{ attendance.student.name }} |
            <strong>Date:</strong> {{ attendance.session.date }}
        </div>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Reason for Absence</label>
                <textarea name="reason" class="form-control" rows="4"
                    placeholder="Explain why you were present but marked absent..." required></textarea>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Proof Image (Optional)</label>
                <input type="file" name="proof_image" class="form-control" accept="image/*">
                <small class="text-muted">Upload selfie or any proof</small>
            </div>
            <button type="submit" class="btn btn-primary px-4">
                <i class="fas fa-paper-plane me-2"></i> Submit Ticket
            </button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
