{% extends 'attendance/base.html' %}
{% block content %}
<div class="card">
    <div class="card-header">
        <i class="fas fa-check-circle me-2"></i> Resolve Ticket
    </div>
    <div class="card-body p-4">
        <div class="alert alert-info">
            <strong>Student:</strong> {{ ticket.student.name }}<br>
            <strong>Date:</strong> {{ ticket.session.date }}<br>
            <strong>Reason:</strong> {{ ticket.reason }}
        </div>
        {% if ticket.proof_image %}
        <div class="mb-3">
            <img src="{{ ticket.proof_image.url }}" class="img-fluid rounded" style="max-height:300px;">
        </div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <button name="action" value="approve" class="btn btn-success px-4 me-2">
                <i class="fas fa-check me-2"></i> Approve
            </button>
            <button name="action" value="reject" class="btn btn-danger px-4">
                <i class="fas fa-times me-2"></i> Reject
            </button>
        </form>
    </div>
</div>
{% endblock %}
